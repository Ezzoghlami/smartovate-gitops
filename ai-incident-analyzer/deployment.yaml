apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-incident-analyzer
  namespace: ai-incident-analyzer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-incident-analyzer
  template:
    metadata:
      labels:
        app: ai-incident-analyzer
    spec:
      containers:
        - name: ai-incident-analyzer
          image: 014498640042.dkr.ecr.eu-north-1.amazonaws.com/smartovate-eks/ai-incident-analyzer:latest
          ports:
            - containerPort: 5001
          env:
            - name: OLLAMA_HOST
              value: "ollama.ai-incident-analyzer.svc.cluster.local:11434"
            - name: PROMETHEUS_HOST
              value: "prometheus-operated.monitoring.svc.cluster.local:9090"
            - name: LOKI_HOST
              value: "loki.monitoring.svc.cluster.local:3100"
            - name: GMAIL_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: ai-analyzer-gmail
                  key: address
            - name: GMAIL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-analyzer-gmail
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ai-incident-analyzer
  namespace: ai-incident-analyzer
spec:
  selector:
    app: ai-incident-analyzer
  ports:
    - port: 5001
      targetPort: 5001
