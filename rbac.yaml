# ─────────────────────────────────────────
# VIEWER — read-only across entire cluster
# ─────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eksmedz-viewer
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "endpoints", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eksmedz-viewer-binding
subjects:
  - kind: ServiceAccount
    name: eksmedz-viewer-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: eksmedz-viewer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eksmedz-viewer-sa
  namespace: default
---
# ─────────────────────────────────────────
# DEVELOPER — deploy/manage in default namespace only, no secrets
# ─────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eksmedz-developer
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eksmedz-developer-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: eksmedz-developer-sa
    namespace: default
roleRef:
  kind: Role
  name: eksmedz-developer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eksmedz-developer-sa
  namespace: default
---
# ─────────────────────────────────────────
# ADMIN — full cluster access
# ─────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eksmedz-admin-binding
subjects:
  - kind: ServiceAccount
    name: eksmedz-admin-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eksmedz-admin-sa
  namespace: default
