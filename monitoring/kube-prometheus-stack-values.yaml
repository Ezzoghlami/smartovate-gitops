alertmanager:
  alertmanagerSpec:
    secrets:
    - alertmanager-gmail-smtp
  config:
    global:
      resolve_timeout: 5m
      smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-gmail-smtp/password
      smtp_auth_username: zoghlamimohamed444@gmail.com
      smtp_from: zoghlamimohamed444@gmail.com
      smtp_require_tls: true
      smtp_smarthost: smtp.gmail.com:587
    receivers:
    - name: "null"
    - email_configs:
      - send_resolved: true
        to: zoghlamimohamed444@gmail.com
      name: email-notifications
    route:
      group_by:
      - namespace
      group_interval: 5m
      group_wait: 30s
      receiver: "null"
      repeat_interval: 12h
      routes:
      - matchers:
        - alertname = "Watchdog"
        receiver: "null"
      - continue: false
        matchers:
        - severity =~ "critical|warning"
        receiver: email-notifications
grafana:
  adminPassword: smartovate2026
  service:
    type: LoadBalancer
kubeControllerManager:
  enabled: false
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
prometheus:
  prometheusSpec:
    retention: 24h
