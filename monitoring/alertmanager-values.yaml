alertmanager:
  alertmanagerSpec:
    secrets:
      - alertmanager-gmail-smtp
  config:
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: 'zoghlamimohamed444@gmail.com'
      smtp_auth_username: 'zoghlamimohamed444@gmail.com'
      smtp_auth_password_file: /etc/alertmanager/secrets/alertmanager-gmail-smtp/password
      smtp_require_tls: true
    route:
      receiver: 'null'
      group_by: ['namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: 'null'
        - matchers:
            - severity =~ "critical|warning"
          receiver: 'email-notifications'
          continue: false
    receivers:
      - name: 'null'
      - name: 'email-notifications'
        email_configs:
          - to: 'zoghlamimohamed444@gmail.com'
            send_resolved: true
