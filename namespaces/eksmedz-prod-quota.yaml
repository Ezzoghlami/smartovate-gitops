apiVersion: v1
kind: ResourceQuota
metadata:
  name: eksmedz-prod-quota
  namespace: eksmedz-prod
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 10Gi
    limits.cpu: "18"
    limits.memory: 14Gi
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: eksmedz-prod-limitrange
  namespace: eksmedz-prod
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 1Gi
      defaultRequest:
        cpu: 500m
        memory: 512Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 50m
        memory: 64Mi
