apiVersion: v1
kind: ResourceQuota
metadata:
  name: eksmedz-staging-quota
  namespace: eksmedz-staging
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 6Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: eksmedz-staging-limitrange
  namespace: eksmedz-staging
spec:
  limits:
    - type: Container
      default:
        cpu: 750m
        memory: 768Mi
      defaultRequest:
        cpu: 250m
        memory: 512Mi
      max:
        cpu: "1500m"
        memory: 1536Mi
      min:
        cpu: 50m
        memory: 64Mi
